<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - ALFA HOSTING</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #0a0a0f; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { background: #1a1a2e; border: 1px solid #333; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; }
        h2 { margin-bottom: 8px; color: #6366f1; }
        p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 24px; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #a1a1aa; }
        input { width: 100%; padding: 12px 16px; background: #0a0a0f; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 1rem; margin-bottom: 16px; outline: none; }
        input:focus { border-color: #6366f1; }
        button { width: 100%; padding: 14px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        button:hover { background: #4f46e5; }
        #result { margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 0.9rem; display: none; }
        .success { background: rgba(16,185,129,0.15); border: 1px solid #10b981; color: #10b981; }
        .error { background: rgba(239,68,68,0.15); border: 1px solid #ef4444; color: #ef4444; }
        .warning { background: rgba(245,158,11,0.15); border: 1px solid #f59e0b; color: #f59e0b; font-size: 0.8rem; margin-bottom: 20px; padding: 10px 14px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🛡️ Setup Admin</h2>
        <p>Buat akun admin pertama kali. Halaman ini hanya bisa dipakai sekali.</p>
        <div class="warning">⚠️ Hapus file ini setelah setup selesai!</div>
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" value="admin">
        <label>Password (min. 12 karakter)</label>
        <input type="password" id="password" placeholder="Contoh: AlfaHosting2026!">
        <label>Konfirmasi Password</label>
        <input type="password" id="confirm" placeholder="Ulangi password">
        <button onclick="setupAdmin()">Buat Akun Admin</button>
        <div id="result"></div>
    </div>

    <script>
        async function setupAdmin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm').value;
            const result   = document.getElementById('result');

            result.style.display = 'none';

            if (!username || !password) {
                showResult('Username dan password harus diisi!', 'error'); return;
            }
            if (password !== confirm) {
                showResult('Password tidak cocok!', 'error'); return;
            }
            if (password.length < 12) {
                showResult('Password minimal 12 karakter!', 'error'); return;
            }

            const btn = document.querySelector('button');
            btn.textContent = 'Memproses...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin-auth?action=setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    showResult('✅ Admin berhasil dibuat! Username: ' + username + '<br>Sekarang <a href="/admin.html" style="color:#10b981;">login di sini</a><br><br>⚠️ Hapus file setup-admin.html dari GitHub!', 'success');
                } else {
                    showResult('❌ ' + (data.error || 'Gagal membuat admin'), 'error');
                }
            } catch (err) {
                showResult('❌ Error: ' + err.message, 'error');
            } finally {
                btn.textContent = 'Buat Akun Admin';
                btn.disabled = false;
            }
        }

        function showResult(msg, type) {
            const el = document.getElementById('result');
            el.innerHTML = msg;
            el.className = type;
            el.style.display = 'block';
        }

        // Enter key
        document.addEventListener('keypress', e => { if (e.key === 'Enter') setupAdmin(); });
    </script>
</body>
</html>
